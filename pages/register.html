            <div class="input-group">

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize language UI
            if (window.updateUI) {
                window.updateUI();
            }
        });
        
        // Toggle password visibility
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            const eyeOpen = button.querySelector('.eye-open');
            const eyeClosed = button.querySelector('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }
        
        window.togglePasswordVisibility = togglePasswordVisibility;
        
        // Toggle company fields visibility
        function toggleCompanyFields() {
            const isCompany = document.getElementById('registerAsCompany').checked;
            const companyContainer = document.getElementById('companyFieldsContainer');
            
            if (isCompany) {
                companyContainer.style.display = 'block';
            } else {
                companyContainer.style.display = 'none';
                // Clear company fields when hidden
                document.getElementById('companyName').value = '';
                document.getElementById('taxNumber').value = '';
                document.getElementById('registrationNumber').value = '';
                document.getElementById('companyAddress').value = '';
                document.getElementById('companyCity').value = '';
                document.getElementById('companyCountry').value = '';
            }
        }
        
        window.toggleCompanyFields = toggleCompanyFields;

async function register() {
    // Get form values
    const firstname = document.getElementById('firstname').value.trim();
    const lastname = document.getElementById('lastname').value.trim();
    const email = document.getElementById('email').value.trim();
    const username = document.getElementById('username').value.trim();
    const phone = document.getElementById('fullPhoneNumber').value; // Get the full phone number
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const terms = document.getElementById('terms').checked;
    const registerAsCompany = document.getElementById('registerAsCompany').checked;
    
    // Validate inputs
    if (!firstname || !lastname || !email || !username || !password || !confirmPassword) {
        utils.showNotification('Prosimo izpolnite vsa obvezna polja!', 'warning');
        return;
    }
    
    if (password !== confirmPassword) {
        utils.showNotification('Gesli se ne ujemata!', 'warning');
        return;
    }
    
    if (!terms) {
        utils.showNotification('Morate se strinjati s pogoji uporabe in politiko zasebnosti!', 'warning');
        return;
    }
    
    // Basic email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        utils.showNotification('Vnesite veljaven email naslov!', 'warning');
        return;
    }
    
    // Validate company fields if registering as company
    let companyData = null;
    if (registerAsCompany) {
        const companyName = document.getElementById('companyName').value.trim();
        const taxNumber = document.getElementById('taxNumber').value.trim();
        const registrationNumber = document.getElementById('registrationNumber').value.trim();
        const companyAddress = document.getElementById('companyAddress').value.trim();
        const companyCity = document.getElementById('companyCity').value.trim();
        const companyCountry = document.getElementById('companyCountry').value.trim();
        
        if (!companyName || !taxNumber) {
            utils.showNotification('Za registracijo podjetja morate vnesti vsaj naziv podjetja in davčno številko!', 'warning');
            return;
        }
        
        companyData = {
            companyName,
            taxNumber,
            registrationNumber: registrationNumber || '',
            address: companyAddress || '',
            city: companyCity || '',
            country: companyCountry || ''
        };
    }
    
    try {
        // Use Firebase registration
        if (typeof window.registerUser === 'function') {
            const user = await window.registerUser(email, password, firstname, lastname, username, phone);
            
            // If company registration, save company data
            if (registerAsCompany && companyData && user) {
                await firebase.firestore().collection('users').doc(user.uid).update({
                    isCompany: true,
                    company: companyData
                });
            }
            
            utils.showNotification('Registracija uspešna! Preverite e-pošto za potrditveno kodo.', 'success');
            // Redirect will be handled by email verification modal
        } else {
            // Fallback if registerUser is not available
            utils.showNotification('Registracija uspešna! Zdaj se lahko prijavite.', 'success');
            window.location.href = 'login.html';
        }
    } catch (error) {
        console.error('Registration error:', error);
        utils.showNotification('Napaka pri registraciji: ' + error.message, 'error');
    }
}
    </script>
