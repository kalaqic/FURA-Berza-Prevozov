<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Prijavite se v svoj FURA račun. Dostopajte do svojih prevozov, upravljajte objave in iščite nove možnosti prevoza.">
    <title data-translate="loginPageTitle">FURA - Prijava</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/modals.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- EmailJS for email sending -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Firebase config -->
    <script src="../js/firebase-config.js"></script>
    
    <!-- Translation System -->
    <script src="../js/translations.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="logo"><img src="../assets/fura logo.png" alt="FURA" style="height: 80px;"></a>
                <div class="nav-right">
                    <!-- Language Selector -->
                    <div class="language-selector">
                        <div class="current-language" onclick="toggleLanguageDropdown()">
                            <img id="currentFlag" src="../assets/flags/slovenia.svg" alt="Slovenia" width="20" height="15">
                            <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="language-dropdown" id="languageDropdown">
                            <div class="language-option" onclick="changeLanguage('sl')">
                                <img src="../assets/flags/slovenia.svg" alt="Slovenia" width="20" height="15">
                                <span>Slovenščina</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('en')">
                                <img src="../assets/flags/england.svg" alt="England" width="20" height="15">
                                <span>English</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('sr')">
                                <img src="../assets/flags/serbia.svg" alt="Serbia" width="20" height="15">
                                <span>Српски</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('it')">
                                <img src="../assets/flags/italy.svg" alt="Italy" width="20" height="15">
                                <span>Italiano</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('de')">
                                <img src="../assets/flags/germany.svg" alt="Germany" width="20" height="15">
                                <span>Deutsch</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('bs')">
                                <img src="../assets/flags/bosnia.svg" alt="Bosnia" width="20" height="15">
                                <span>Bosanski</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('hr')">
                                <img src="../assets/flags/croatia.svg" alt="Croatia" width="20" height="15">
                                <span>Hrvatski</span>
                            </div>
                            <div class="language-option" onclick="changeLanguage('me')">
                                <img src="../assets/flags/montenegro.svg" alt="Montenegro" width="20" height="15">
                                <span>Crnogorski</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="auth-buttons">
                        <a href="../index.html" class="btn btn-outline" data-translate="backToSearch">Nazaj na iskanje</a>
                        <a href="register.html" class="btn btn-primary" data-translate="register">Registracija</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <div class="form-container">
            <h2 class="form-title" data-translate="loginTitle">Prijava</h2>
            
            <div class="input-group">
                <label class="input-label" data-translate="emailOrUsername">Email ali uporabniško ime</label>
                <input type="text" id="username" class="input-field" placeholder="Vnesite email ali uporabniško ime">
            </div>
            
            <div class="input-group">
                <label class="input-label" data-translate="password">Geslo</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" class="input-field" placeholder="Vnesite geslo">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="form-footer-link">
                <a href="#" onclick="showForgotPasswordModal(); return false;" data-translate="forgotPassword">Pozabljeno geslo?</a>
            </div>
            
            <button class="btn btn-primary search-btn" onclick="login()" data-translate="loginButton">Prijava</button>
            
            <div class="form-footer">
                <p><span data-translate="noAccount">Nimate računa?</span> <a href="register.html" data-translate="registerLink">Registrirajte se</a></p>
            </div>
        </div>
    </main>
    
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        function login() {
            const email = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Validate inputs
            if (!email || !password) {
                utils.showNotification('Prosimo vnesite e-poštni naslov in geslo!', 'warning');
                return;
            }
            
            // Use Firebase auth
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    utils.showNotification('Uspešna prijava!', 'success');
                    window.location.href = '../index.html';
                })
                .catch((error) => {
                    console.error('Login error:', error);
                    let errorMessage = 'Napaka pri prijavi.';
                    if (error.code === 'auth/user-not-found') {
                        errorMessage = 'Uporabnik s tem e-poštnim naslovom ne obstaja.';
                    } else if (error.code === 'auth/wrong-password') {
                        errorMessage = 'Napačno geslo.';
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = 'Neveljaven e-poštni naslov.';
                    } else {
                        errorMessage = error.message;
                    }
                    utils.showNotification(errorMessage, 'error');
                });
        }
        
        // Show forgot password modal
        function showForgotPasswordModal() {
            // Create modal if it doesn't exist
            let modal = document.getElementById('forgotPasswordModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'forgotPasswordModal';
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 data-translate="forgotPasswordTitle">Pozabljeno geslo</h2>
                            <div class="modal-close" onclick="closeForgotPasswordModal()">✕</div>
                        </div>
                        <div class="modal-body">
                            <p data-translate="forgotPasswordInstructions" style="margin-bottom: 20px;">Vnesite vaš e-poštni naslov. Prejeli boste e-pošto s povezavo za ponastavitev gesla.</p>
                            <div class="input-group">
                                <label class="input-label" data-translate="email">E-poštni naslov</label>
                                <input type="email" id="forgotPasswordEmail" class="input-field" placeholder="Vnesite e-poštni naslov" required>
                            </div>
                            <div class="form-actions">
                                <button class="btn btn-primary" onclick="handleForgotPasswordSubmit()" data-translate="sendResetEmail">Pošlji e-pošto za ponastavitev</button>
                                <button class="btn btn-outline" onclick="closeForgotPasswordModal()" data-translate="cancel">Prekliči</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                // Add styles
                if (!document.getElementById('forgotPasswordModalStyles')) {
                    const style = document.createElement('style');
                    style.id = 'forgotPasswordModalStyles';
                    style.textContent = `
                        .form-actions {
                            display: flex;
                            gap: 10px;
                            justify-content: center;
                            margin-top: 20px;
                        }
                        .form-footer-link {
                            text-align: right;
                            margin-bottom: 15px;
                        }
                        .form-footer-link a {
                            color: var(--primary-color);
                            text-decoration: none;
                            font-size: 14px;
                        }
                        .form-footer-link a:hover {
                            text-decoration: underline;
                        }
                    `;
                    document.head.appendChild(style);
                }
            }
            
            // Clear email field
            document.getElementById('forgotPasswordEmail').value = '';
            modal.style.display = 'flex';
        }
        
        // Close forgot password modal
        function closeForgotPasswordModal() {
            const modal = document.getElementById('forgotPasswordModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }
        
        // Handle forgot password submit - use Firebase's built-in reset with rate limiting
        async function handleForgotPasswordSubmit() {
            const email = document.getElementById('forgotPasswordEmail').value.trim();
            
            if (!email) {
                utils.showNotification('Vnesite e-poštni naslov.', 'warning');
                return;
            }
            
            try {
                // Use rate-limited password reset function
                await utils.sendPasswordResetEmailWithRateLimit(email);
                
                utils.showNotification('E-pošta za ponastavitev gesla je bila poslana. Prosimo preverite vaš e-poštni predal.', 'success');
                closeForgotPasswordModal();
            } catch (error) {
                console.error('Error sending password reset email:', error);
                
                // Check if it's a rate limit error
                if (error.message && error.message.includes('Preveč zahtev')) {
                    utils.showNotification(error.message, 'warning');
                } else {
                    // Don't reveal if user exists for security
                    utils.showNotification('Če račun obstaja, boste prejeli e-pošto za ponastavitev gesla.', 'info');
                }
            }
        }
        
        // Toggle password visibility
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            const eyeOpen = button.querySelector('.eye-open');
            const eyeClosed = button.querySelector('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                input.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }
        
        // Make functions globally available
        window.showForgotPasswordModal = showForgotPasswordModal;
        window.closeForgotPasswordModal = closeForgotPasswordModal;
        window.handleForgotPasswordSubmit = handleForgotPasswordSubmit;
        window.togglePasswordVisibility = togglePasswordVisibility;
    </script>
</body>
</html>
